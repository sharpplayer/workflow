cors:
  allowedOrigins: http://localhost:4200,http://internal-host:4200

logging:
  level:
    org.springframework.cloud.vault: DEBUG
    org.springframework.vault: DEBUG

server:
  servlet:
    context-path: /api

spring:
  config:
    import: vault://
  datasource:
    url: jdbc:postgresql://localhost:5432/matchboard
    username: postgres
    password: ${password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  flyway:
    enabled: true
    locations: classpath:db/migration

  cloud:
    vault:
      ssl:
        trust-store: file:vault/cert/vault.pem
        trust-store-type: PEM
      host: localhost
      port: 8200
      scheme: https
      authentication: TOKEN
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret
        application-name: postgres